<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

html,body{

margin:0;

padding:0;

width:100%;

height:320px;

overflow:hidden;

background:transparent;

}


body{

display:flex;

justify-content:center;

align-items:center;

}



#container{

position:relative;

width:220px;

height:320px;

display:flex;

flex-direction:column;

align-items:center;

justify-content:flex-start;

}



#balloon{

margin-top:10px;

width:180px;

background:#fffaf0;

padding:10px;

border-radius:25px;

border:3px solid #d8a45d;

font-size:16px;

font-weight:bold;

color:#7a4b20;

text-align:center;

box-shadow:0 5px 10px rgba(0,0,0,0.15);

display:none;

}


#balloon::after{

content:"";

position:absolute;

}



.show{

display:block;

animation:pop 0.3s ease;

}


@keyframes pop{

0%{

transform:scale(0);

}

100%{

transform:scale(1);

}

}



#mascot{

width:180px;

cursor:pointer;

margin-top:20px;

}



.shake{

animation:shake 0.8s ease;

}


@keyframes shake{

0%{

transform:rotate(0);

}

25%{

transform:rotate(8deg);

}

50%{

transform:rotate(-8deg);

}

75%{

transform:rotate(5deg);

}

100%{

transform:rotate(0);

}

}


</style>


</head>


<body>


<div id="container">


<div id="balloon">

<span id="message">你好</span>

</div>


<img id="mascot" src="mascot.jpeg">


</div>



<script>


const mascot=document.getElementById("mascot");

const balloon=document.getElementById("balloon");

const message=document.getElementById("message");



function showBalloon(text){

message.textContent=text;

balloon.classList.add("show");


setTimeout(()=>{

balloon.classList.remove("show");

},3000);


}


function shake(){

mascot.classList.remove("shake");

void mascot.offsetWidth;

mascot.classList.add("shake");

}



window.onload=()=>{

showBalloon("你好！！！");

shake();

};



const words=[

"ようこそ",

"2026年でデビュー35周年",

"二胡レッスン！",

"ニコニコ"

];



mascot.onclick=()=>{


const text=words[Math.floor(Math.random()*words.length)];


showBalloon(text);

shake();


};



</script>


</body>

</html>

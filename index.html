<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Erhu Mascot</title>


<style>


html,body{

margin:0;

padding:0;

width:100%;

height:100%;

overflow:hidden;

background:transparent;

}



body{

display:flex;

justify-content:center;

align-items:center;

}



#container{

position:relative;

width:260px;

height:260px;

display:flex;

justify-content:center;

align-items:center;

overflow:visible;

}



#mascot{

width:180px;

max-width:70vw;

cursor:pointer;

}



/* 吹き出し */

#balloon{


position:absolute;


top:20px;


left:170px;


background:#fffaf0;


padding:12px 25px;


border-radius:25px;


border:3px solid #d8a45d;


font-size:18px;


font-weight:bold;


color:#7a4b20;


box-shadow:0 5px 10px rgba(0,0,0,0.15);


display:none;


white-space:nowrap;


z-index:10;


}



#balloon::after{


content:"";


position:absolute;


left:25px;


bottom:-15px;


border-width:15px 15px 0 15px;


border-style:solid;


border-color:#d8a45d transparent transparent transparent;


}



/* 吹き出し表示 */

.show{


display:block !important;

animation:pop 0.3s ease;

}



@keyframes pop{


0%{

transform:scale(0);

}


80%{

transform:scale(1.1);

}


100%{

transform:scale(1);

}


}



/* 揺れ */

.shake{


animation:shake 0.8s ease;

}



@keyframes shake{


0%{

transform:rotate(0deg);

}


20%{

transform:rotate(8deg);

}


40%{

transform:rotate(-8deg);

}


60%{

transform:rotate(6deg);

}


80%{

transform:rotate(-4deg);

}


100%{

transform:rotate(0deg);

}


}




</style>


</head>


<body>


<div id="container">


<img

id="mascot"

src="mascot.jpeg"

alt="マスコット">


<div id="balloon">

<span id="message">你好</span>

</div>


</div>




<script>


const mascot=document.getElementById("mascot");

const balloon=document.getElementById("balloon");

const message=document.getElementById("message");




// 吹き出し表示

function showBalloon(text){


message.textContent=text;


balloon.classList.remove("show");


void balloon.offsetWidth;


balloon.classList.add("show");



setTimeout(()=>{


balloon.classList.remove("show");


},3000);


}




// 揺れ

function shakeMascot(){


mascot.classList.remove("shake");


void mascot.offsetWidth;


mascot.classList.add("shake");


}



// 初回

window.onload=function(){


showBalloon("你好");


shakeMascot();


};




// クリック時

const words=[


"ようこそ",


"2026年で35周年",


"二胡レッスン！",


"ニコニコ"


];



mascot.onclick=function(){


const random=Math.floor(

Math.random()*words.length

);



showBalloon(words[random]);


shakeMascot();


};



</script>


</body>


</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erhu Mascot</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:transparent;
}

#container{
    position:relative;
    display:inline-block;
}

#mascot{
    width:180px;
    cursor:pointer;
}

#balloon{

    position:absolute;
    top:-40px;
    left:120px;

    background:white;
    padding:10px 15px;

    border-radius:15px;

    border:2px solid #666;

    font-size:18px;

    display:block;

}

#balloon::after{

    content:"";

    position:absolute;

    left:15px;

    bottom:-12px;

    border-width:12px 12px 0 12px;

    border-style:solid;

    border-color:white transparent transparent transparent;

}

    @keyframes shake {

0%{
transform:rotate(0deg);
}

25%{
transform:rotate(5deg);
}

50%{
transform:rotate(0deg);
}

75%{
transform:rotate(-5deg);
}

100%{
transform:rotate(0deg);
}

}


.shake{

animation:shake 3s ease-in-out;

}


.show{

display:block !important;

}

</style>

</head>

<body>

<div id="container">

<img
id="mascot"
src="mascot.jpeg"
alt="マスコット">

<div id="balloon">

<span id="message">你好</span>

</div>

</div>

    <script>

const mascot = document.getElementById("mascot");
const balloon = document.getElementById("balloon");
const message = document.getElementById("message");


window.onload=function(){

balloon.classList.add("show");

mascot.classList.add("shake");


setTimeout(function(){

balloon.classList.remove("show");

},3000);

};



const words=[

"ようこそ",

"2026年で35周年",

"二胡レッスン！",

"ニコニコ"

];


mascot.onclick=function(){

const random=Math.floor(
Math.random()*words.length
);


message.textContent=words[random];

balloon.classList.add("show");

};


</script>

</body>

</html>
